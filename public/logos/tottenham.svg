<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="48" fill="#132257"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Cockerel body -->
  <g transform="translate(50,42) scale(0.9)">
    <!-- Football -->
    <ellipse cx="0" cy="18" rx="14" ry="8" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M-14 18 Q-7 12 0 18 Q7 12 14 18" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <path d="M0 10 L0 26" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <path d="M-10 13 Q0 18 10 13" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
    <!-- Legs -->
    <line x1="-4" y1="10" x2="-6" y2="18" stroke="#FFFFFF" stroke-width="1.5"/>
    <line x1="4" y1="10" x2="6" y2="18" stroke="#FFFFFF" stroke-width="1.5"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#FFFFFF"/>
    <!-- Neck -->
    <path d="M0 -12 Q-2 -22 2 -28 Q6 -22 4 -12" fill="#FFFFFF"/>
    <!-- Head -->
    <circle cx="3" cy="-28" r="5" fill="#FFFFFF"/>
    <!-- Beak -->
    <path d="M8 -29 L14 -27 L8 -25" fill="#132257"/>
    <!-- Eye -->
    <circle cx="5" cy="-29" r="1" fill="#132257"/>
    <!-- Comb -->
    <path d="M1 -33 Q3 -37 5 -33 Q7 -37 9 -33" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0.5"/>
    <!-- Wattle -->
    <path d="M8 -26 Q10 -23 8 -22" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0.5"/>
    <!-- Tail feathers -->
    <path d="M-8 -5 Q-18 -15 -14 -25 Q-10 -18 -6 -8" fill="#FFFFFF"/>
    <path d="M-6 -3 Q-15 -12 -12 -22 Q-8 -14 -4 -6" fill="#FFFFFF"/>
  </g>
</svg>
